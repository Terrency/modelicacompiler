version: '3.8'

services:
  # 后端服务
  backend:
    image: openjdk:17-jdk-slim
    container_name: modelica-ide-backend
    working_dir: /app
    volumes:
      - ./modelica-ide-backend.jar:/app/modelica-ide-backend.jar
    command: java -jar modelica-ide-backend.jar
    ports:
      - "8080:8080"
    networks:
      - modelica-network
    restart: unless-stopped

  # Nginx 前端服务
  nginx:
    image: nginx:alpine
    container_name: modelica-ide-nginx
    volumes:
      - ./nginx:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - modelica-network
    restart: unless-stopped

networks:
  modelica-network:
    driver: bridge